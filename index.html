<!doctype html>
<html lang="zh">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>家庭健康档案</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Kalam:wght@300;400;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260421-weight-row">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="static-api.js"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel" src="components/primitives.jsx?v=20260421-weight-row"></script>
  <script type="text/babel" src="components/screen_family.jsx?v=20260421-weight-row"></script>
  <script type="text/babel" src="components/screen_member.jsx?v=20260421-weight-row"></script>

  <script type="text/babel" data-presets="react">

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "density": "cozy",
      "palette": "warm"
    }/*EDITMODE-END*/;

    const SCREENS = [
      { key: 'family', num: '00', title: '家庭总览' },
      { key: 'member', num: '01', title: '成员档案' },
    ];

    const apiGet = async (path) => {
      const res = await fetch(path);
      if (!res.ok) throw new Error(`${path} · ${res.status}`);
      return res.json();
    };

    function App() {
      const [screen, setScreen] = React.useState(() => localStorage.getItem('fhv2_screen') || 'family');
      const [memberKey, setMemberKey] = React.useState(() => localStorage.getItem('fhv2_member') || 'demo-self');
      const [density, setDensity] = React.useState(TWEAK_DEFAULTS.density);
      const [palette, setPalette] = React.useState(TWEAK_DEFAULTS.palette);
      const [tweaksOpen, setTweaksOpen] = React.useState(false);
      const [members, setMembers] = React.useState([]);
      const [loading, setLoading] = React.useState(true);
      const [error, setError] = React.useState('');
      const [meta, setMeta] = React.useState({ mock_mode: false });

      React.useEffect(() => {
        document.documentElement.dataset.density = density;
        document.documentElement.dataset.palette = palette;
      }, [density, palette]);

      React.useEffect(() => { localStorage.setItem('fhv2_screen', screen); }, [screen]);
      React.useEffect(() => { localStorage.setItem('fhv2_member', memberKey); }, [memberKey]);

      const loadShellData = React.useCallback(async () => {
        setError('');
        setLoading(true);
        try {
          const membersData = await apiGet('/api/members');
          setMembers(membersData);
          if (membersData.length && !membersData.some(m => m.key === memberKey)) {
            setMemberKey(membersData[0].key);
          }
        } catch (err) {
          setError(err.message || 'API 加载失败');
        } finally {
          setLoading(false);
        }
      }, [memberKey]);

      React.useEffect(() => {
        loadShellData();
        apiGet('/api/meta').then(setMeta).catch(() => { });
      }, []);

      React.useEffect(() => {
        const onMsg = (e) => {
          const d = e.data || {};
          if (d.type === '__activate_edit_mode') setTweaksOpen(true);
          if (d.type === '__deactivate_edit_mode') setTweaksOpen(false);
        };
        window.addEventListener('message', onMsg);
        window.parent?.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);

      const persist = (edits) => {
        window.parent?.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
      };
      const setDens = (v) => { setDensity(v); persist({ density: v }); };
      const setPal = (v) => { setPalette(v); persist({ palette: v }); };

      const openMember = (key) => {
        setMemberKey(key);
        setScreen('member');
      };

      return (
        <div className="app">
          <div className="mast">
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 14, flexWrap: 'wrap' }}>
              <h1><Scribble>家庭健康档案</Scribble></h1>
              <div className="sub">Family Health Archive</div>
            </div>
            <div className="meta">
              {meta.mock_mode && <span className="mode-badge">模拟模式</span>}
            </div>
          </div>

          <div className="screen-tabs" data-screen-label="顶层导航">
            {SCREENS.map(s => (
              <button
                key={s.key}
                className={`screen-tab ${screen === s.key ? 'active' : ''}`}
                onClick={() => setScreen(s.key)}
              >
                <span className="k">{s.num}</span>{s.title}
              </button>
            ))}
          </div>

          <div data-screen-label={`${SCREENS.find(s => s.key === screen).num} ${SCREENS.find(s => s.key === screen).title}`}>
            {error && (
              <div className="sketch" style={{ padding: 18, marginBottom: 14, background: 'color-mix(in oklab, var(--danger) 12%, var(--paper))' }}>
                <div className="sec-label">API 加载失败</div>
                <div className="mono">{error}</div>
                <div style={{ marginTop: 10 }}><Btn onClick={loadShellData}>重试</Btn></div>
              </div>
            )}
            {screen === 'family' && (
              <ScreenFamily
                members={members}
                loading={loading}
                onOpenMember={openMember}
              />
            )}
            {screen === 'member' && (
              <ScreenMember
                members={members}
                memberKey={memberKey}
                onChangeMember={openMember}
                onDataChanged={loadShellData}
              />
            )}
          </div>

          <div className={`tweaks ${tweaksOpen ? 'open' : ''}`}>
            <h4>Tweaks</h4>
            <div className="row">
              <label>密度</label>
              <div className="opts">
                {['compact', 'cozy', 'spacious'].map(v => (
                  <button key={v} className={`opt ${density === v ? 'active' : ''}`} onClick={() => setDens(v)}>
                    {({ compact: '紧凑', cozy: '适中', spacious: '舒展' })[v]}
                  </button>
                ))}
              </div>
            </div>
            <div className="row">
              <label>配色</label>
              <div className="opts">
                {['warm', 'mint', 'mono'].map(v => (
                  <button key={v} className={`opt ${palette === v ? 'active' : ''}`} onClick={() => setPal(v)}>
                    {({ warm: '暖橙', mint: '薄荷', mono: '墨黑' })[v]}
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
